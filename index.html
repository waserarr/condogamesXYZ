<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Our Discord</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #2c2f38;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #36393f;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 36px;
            color: #7289da;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            margin-bottom: 30px;
        }
        .join-btn {
            background-color: #7289da;
            color: #ffffff;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .join-btn:hover {
            background-color: #5f73b1;
        }
        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Join Our Discord</h1>
        <p>Be a part of our awesome community! Click below to join us on Discord and start chatting.</p>
        <a href="https://discord.gg/qmHbxRreVT" target="_blank">
            <button class="join-btn">Join Discord</button>
        </a>
        <div class="footer">Made with ❤️ by Your Community</div>
    </div>

</body>
</html>
